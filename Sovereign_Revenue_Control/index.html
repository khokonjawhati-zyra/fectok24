<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Control</title>
    <style>
        body {
            background: #121212;
            color: #00FFFF;
            font-family: sans-serif;
            padding: 30px;
        }
    </style>
</head>

<body>
    <h3>🚀 Revenue Slider Control (A_105)</h3>
    Platform % <input type='range' id='p' value='70' oninput='u()' title='Platform Share'> <span id='pv'>70</span><br>
    Creator % <input type='range' id='c' value='20' oninput='u()' title='Creator Share'> <span id='cv'>20</span><br>
    User % <input type='range' id='u_r' value='10' oninput='u()' title='User Share'> <span id='uv'>10</span><br>
    <script>
        function u() {
            const p = document.getElementById('p').value, c = document.getElementById('c').value, u_r = document.getElementById('u_r').value;
            document.getElementById('pv').innerText = p; document.getElementById('cv').innerText = c; document.getElementById('uv').innerText = u_r;
            fetch('http://localhost:7000/update_shares?p=' + p + '&c=' + c + '&u=' + u_r, { method: 'POST' });
        }
    </script>
</body>

</html>
