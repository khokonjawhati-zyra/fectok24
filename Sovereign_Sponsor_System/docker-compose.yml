version: '3.8'
services:
  redis:
    image: redis:alpine
    container_name: sponsor_redis
    ports:
      - "6382:6379"
  api:
    image: python:3.11-slim-bookworm
    container_name: sponsor_api
    command: sh -c "pip install fastapi uvicorn redis && uvicorn main:app --host 0.0.0.0 --port 9000"
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - '9000:9000'
    depends_on:
      - redis
  admin:
    image: nginx:alpine
    container_name: sponsor_admin
    ports:
      - '8089:80'
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
