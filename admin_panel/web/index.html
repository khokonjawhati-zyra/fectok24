  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sovereign_admin">

  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Sovereign V15: Native JS CSV Downloader [100% Filename Fix] -->
  <!-- Dart html interop does NOT reliably set download attribute on Blob URLs. -->
  <!-- This native JS function bypasses that interop and guarantees correct filename. -->
  <script>
    window.sovDownloadCSV = function(url, filename) {
      fetch(url)
        .then(function(response) { return response.blob(); })
        .then(function(blob) {
          var a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename || 'fectok_bank_payout_export.csv';
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(function() {
            if (document.body.contains(a)) document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
          }, 2000);
        })
        .catch(function(e) { console.error('SOV CSV Download Error:', e); });
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
