version: "3.8"
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  api:
    image: python:3.11-slim-bookworm
    command: sh -c "pip install fastapi uvicorn redis && uvicorn main:app --host 0.0.0.0 --port 6000"
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "6000:6000"
  admin:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
